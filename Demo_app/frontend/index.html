<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FaceNet — Face Verification Demo</title>
  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --card:      #1a1d27;
      --border:    #2e3244;
      --accent:    #6c63ff;
      --accent2:   #a78bfa;
      --green:     #22c55e;
      --red:       #ef4444;
      --yellow:    #f59e0b;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --radius:    14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 64px;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.95rem;
    }

    /* ── Main Layout ── */
    .panels {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      width: 100%;
      max-width: 860px;
    }

    /* ── Face Card ── */
    .face-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .face-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent2);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    /* ── Preview Box ── */
    .preview-box {
      width: 100%;
      aspect-ratio: 1;
      background: #0d0f1a;
      border: 2px dashed var(--border);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      transition: border-color 0.2s;
    }
    .preview-box.loaded {
      border-style: solid;
      border-color: var(--accent);
    }
    .preview-box img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .preview-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 0.85rem;
    }
    .preview-placeholder svg {
      opacity: 0.4;
    }

    /* ── Buttons ── */
    .btn-row {
      display: flex;
      gap: 10px;
    }
    button {
      flex: 1;
      padding: 10px 14px;
      border-radius: 8px;
      border: none;
      font-size: 0.88rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    button:hover  { opacity: 0.88; }
    button:active { transform: scale(0.97); }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-upload { background: var(--accent); color: #fff; }
    .btn-webcam { background: #2e3244; color: var(--text); }
    .btn-verify {
      width: 100%;
      max-width: 280px;
      padding: 14px;
      font-size: 1rem;
      background: linear-gradient(135deg, var(--accent), #8b5cf6);
      color: #fff;
      border-radius: 10px;
      margin-top: 8px;
    }
    .btn-verify:disabled { background: #2e3244; }

    /* ── Verify Section ── */
    .verify-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      width: 100%;
      max-width: 860px;
    }

    /* ── Result Card ── */
    .result-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      width: 100%;
      max-width: 860px;
      margin-top: 24px;
      display: none;
      flex-direction: column;
      gap: 20px;
    }
    .result-card.visible { display: flex; }

    .verdict {
      text-align: center;
      font-size: 1.6rem;
      font-weight: 700;
    }
    .verdict.same  { color: var(--green); }
    .verdict.diff  { color: var(--red);   }

    /* ── Stats Row ── */
    .stats-row {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 12px;
    }
    .stat-box {
      text-align: center;
    }
    .stat-box .label {
      font-size: 0.75rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .stat-box .value {
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 2px;
    }

    /* ── Similarity Bar ── */
    .bar-container {
      width: 100%;
    }
    .bar-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.78rem;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .bar-track {
      width: 100%;
      height: 12px;
      background: #1e2130;
      border-radius: 99px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 99px;
      transition: width 0.6s ease;
      background: linear-gradient(90deg, var(--red), var(--yellow), var(--green));
      background-size: 200% 100%;
    }

    /* ── Threshold marker ── */
    .threshold-marker {
      position: relative;
      height: 18px;
      margin-top: 2px;
    }
    .threshold-line {
      position: absolute;
      top: 0;
      width: 2px;
      height: 100%;
      background: var(--muted);
      border-radius: 2px;
    }
    .threshold-label {
      position: absolute;
      top: 0;
      font-size: 0.7rem;
      color: var(--muted);
      transform: translateX(-50%);
      white-space: nowrap;
    }

    /* ── Threshold Slider ── */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .slider-row input[type=range] {
      flex: 1;
      accent-color: var(--accent);
    }
    .slider-row span { min-width: 40px; text-align: right; color: var(--text); font-weight: 600; }

    /* ── Error ── */
    .error-msg {
      color: var(--red);
      font-size: 0.88rem;
      text-align: center;
      display: none;
    }
    .error-msg.visible { display: block; }

    /* ── Loading Spinner ── */
    .spinner {
      display: none;
      width: 24px; height: 24px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .spinner.visible { display: inline-block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Webcam Modal ── */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 360px;
    }
    .modal h3 { font-size: 1rem; font-weight: 600; }
    .modal video {
      width: 100%; border-radius: 8px;
      background: #000;
      aspect-ratio: 1;
      object-fit: cover;
    }
    .modal-btns { display: flex; gap: 10px; }
    .btn-capture { background: var(--green); color: #fff; }
    .btn-cancel  { background: #2e3244;      color: var(--text); }

    canvas { display: none; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <h1>⬡ FaceNet Verification</h1>
  <p>NN2 · 128-dim embeddings · Triplet Loss · VGGFace2</p>
</header>

<!-- ── Face Panels ── -->
<div class="panels">

  <!-- Face 1 -->
  <div class="face-card">
    <h2>Face 1</h2>
    <div class="preview-box" id="preview1">
      <div class="preview-placeholder">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <circle cx="12" cy="8"  r="4" stroke-width="1.5"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>No image selected</span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-upload" onclick="triggerUpload(1)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload
      </button>
      <button class="btn-webcam" onclick="openWebcam(1)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        Webcam
      </button>
    </div>
    <input type="file" id="file1" accept="image/*" style="display:none" onchange="handleFile(event,1)"/>
  </div>

  <!-- Face 2 -->
  <div class="face-card">
    <h2>Face 2</h2>
    <div class="preview-box" id="preview2">
      <div class="preview-placeholder">
        <svg width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <circle cx="12" cy="8"  r="4" stroke-width="1.5"/>
          <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <span>No image selected</span>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-upload" onclick="triggerUpload(2)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload
      </button>
      <button class="btn-webcam" onclick="openWebcam(2)">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
          <path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/>
        </svg>
        Webcam
      </button>
    </div>
    <input type="file" id="file2" accept="image/*" style="display:none" onchange="handleFile(event,2)"/>
  </div>

</div>

<!-- ── Threshold slider ── -->
<div class="verify-section">
  <div class="slider-row" style="width:100%;max-width:860px">
    <label>Threshold</label>
    <input type="range" id="thresholdSlider" min="0.3" max="2.0" step="0.01" value="0.9"
           oninput="document.getElementById('thresholdVal').textContent=parseFloat(this.value).toFixed(3)"/>
    <span id="thresholdVal">0.900</span>
  </div>

  <button class="btn-verify" id="verifyBtn" onclick="verify()" disabled>
    <span id="verifyLabel">Compare Faces</span>
    <div class="spinner" id="spinner"></div>
  </button>
  <div class="error-msg" id="errorMsg"></div>
</div>

<!-- ── Result ── -->
<div class="result-card" id="resultCard">
  <div class="verdict" id="verdict"></div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="label">L2 Distance</div>
      <div class="value" id="distVal">—</div>
    </div>
    <div class="stat-box">
      <div class="label">Similarity</div>
      <div class="value" id="simVal">—</div>
    </div>
    <div class="stat-box">
      <div class="label">Threshold</div>
      <div class="value" id="thrVal">—</div>
    </div>
  </div>

  <!-- Similarity bar -->
  <div class="bar-container">
    <div class="bar-label">
      <span>0% match</span>
      <span>Similarity Score</span>
      <span>100% match</span>
    </div>
    <div class="bar-track">
      <div class="bar-fill" id="barFill" style="width:0%; background-position: 0% 0%"></div>
    </div>
    <div class="threshold-marker" id="thrMarker">
      <div class="threshold-line" id="thrLine"></div>
      <div class="threshold-label" id="thrLineLabel">threshold</div>
    </div>
  </div>
</div>

<!-- ── Webcam Modal ── -->
<div class="modal-overlay" id="webcamModal">
  <div class="modal">
    <h3 id="modalTitle">Capture Face</h3>
    <video id="webcamFeed" autoplay playsinline muted></video>
    <div class="modal-btns">
      <button class="btn-capture" onclick="captureFrame()">📸 Capture</button>
      <button class="btn-cancel"  onclick="closeWebcam()">✕ Cancel</button>
    </div>
  </div>
</div>

<canvas id="snapCanvas"></canvas>

<script>
  // ─── State ───────────────────────────────────────────
  const images = { 1: null, 2: null };  // stores base64 strings
  let activeSlot = null;
  let stream = null;

  const API = 'http://localhost:5000/verify';

  // ─── Upload helpers ───────────────────────────────────
  function triggerUpload(slot) {
    document.getElementById('file' + slot).click();
  }

  function handleFile(event, slot) {
    const file = event.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => setImage(slot, e.target.result);
    reader.readAsDataURL(file);
  }

  function setImage(slot, dataUrl) {
    images[slot] = dataUrl;
    const box = document.getElementById('preview' + slot);
    box.innerHTML = `<img src="${dataUrl}" alt="Face ${slot}"/>`;
    box.classList.add('loaded');
    updateVerifyBtn();
  }

  function updateVerifyBtn() {
    const btn = document.getElementById('verifyBtn');
    btn.disabled = !(images[1] && images[2]);
  }

  // ─── Webcam ───────────────────────────────────────────
  function openWebcam(slot) {
    activeSlot = slot;
    document.getElementById('modalTitle').textContent = `Capture Face ${slot}`;
    document.getElementById('webcamModal').classList.add('open');
    navigator.mediaDevices.getUserMedia({ video: true })
      .then(s => {
        stream = s;
        document.getElementById('webcamFeed').srcObject = s;
      })
      .catch(() => {
        alert('Could not access webcam. Please allow camera permission.');
        closeWebcam();
      });
  }

  function captureFrame() {
    const video  = document.getElementById('webcamFeed');
    const canvas = document.getElementById('snapCanvas');
    canvas.width  = video.videoWidth  || 320;
    canvas.height = video.videoHeight || 320;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.92);
    setImage(activeSlot, dataUrl);
    closeWebcam();
  }

  function closeWebcam() {
    if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }
    document.getElementById('webcamModal').classList.remove('open');
    document.getElementById('webcamFeed').srcObject = null;
  }

  // ─── Verify ──────────────────────────────────────────
  async function verify() {
    const btn     = document.getElementById('verifyBtn');
    const label   = document.getElementById('verifyLabel');
    const spinner = document.getElementById('spinner');
    const errBox  = document.getElementById('errorMsg');

    btn.disabled   = true;
    label.textContent = 'Analysing…';
    spinner.classList.add('visible');
    errBox.classList.remove('visible');

    const threshold = parseFloat(document.getElementById('thresholdSlider').value);

    try {
      const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          image1:    images[1],
          image2:    images[2],
          threshold: threshold,
        }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.error || `Server error ${res.status}`);
      }

      const data = await res.json();
      showResult(data, threshold);

    } catch (e) {
      errBox.textContent = '⚠ ' + (e.message.includes('Failed to fetch')
        ? 'Cannot reach backend. Is app.py running on port 5000?'
        : e.message);
      errBox.classList.add('visible');
    } finally {
      btn.disabled = false;
      label.textContent = 'Compare Faces';
      spinner.classList.remove('visible');
    }
  }

  // ─── Show Result ─────────────────────────────────────
  function showResult(data, threshold) {
    const card = document.getElementById('resultCard');
    card.classList.add('visible');

    const isSame = data.distance < threshold;
    const verdict = document.getElementById('verdict');
    verdict.textContent  = isSame ? '✅  Same Person' : '❌  Different Person';
    verdict.className    = 'verdict ' + (isSame ? 'same' : 'diff');

    document.getElementById('distVal').textContent = data.distance.toFixed(4);
    document.getElementById('simVal').textContent  = data.similarity.toFixed(1) + '%';
    document.getElementById('thrVal').textContent  = threshold.toFixed(3);

    document.getElementById('simVal').style.color =
      data.similarity > 66 ? 'var(--green)'  :
      data.similarity > 33 ? 'var(--yellow)' : 'var(--red)';

    // Fill bar
    const bar = document.getElementById('barFill');
    bar.style.width = data.similarity + '%';
    // Background shift to show correct colour zone
    const shift = (100 - data.similarity);
    bar.style.backgroundPosition = shift + '% 0%';

    // Threshold marker line position
    // threshold maps to: similarity = (1 - threshold/(2*threshold)) * 100 = 50%
    // But we draw the line at the threshold's equivalent position on the similarity bar
    const thrPct = Math.max(0, Math.min(100, (1 - threshold / (2 * threshold)) * 100));
    const thrLine  = document.getElementById('thrLine');
    const thrLabel = document.getElementById('thrLineLabel');
    thrLine.style.left  = thrPct + '%';
    thrLabel.style.left = thrPct + '%';
    thrLabel.textContent = `τ=${threshold.toFixed(3)}`;

    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
</script>
</body>
</html>
